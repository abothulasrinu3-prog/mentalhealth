name: Timetable reminder emails

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reminder endpoint
        env:
          REMINDER_URL: ${{ vars.REMINDER_URL || 'https://server-sepia-two-58.vercel.app/api/timetable/run-reminders' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repository secret is required."
            exit 1
          fi

          curl --fail --show-error --silent \
            --max-time 60 \
            --retry 2 \
            --retry-delay 10 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$REMINDER_URL"
